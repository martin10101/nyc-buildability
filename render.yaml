# =============================================================================
# NYC Development Feasibility Platform - Render Blueprint (Infrastructure as Code)
# =============================================================================
# Governing decisions: docs/adr/ADR-001-cloud-architecture.md (topology),
#   docs/adr/ADR-002-environment-separation.md (which branch/environment this
#   file deploys), docs/adr/ADR-003-deployment-and-rollback.md (deploy order,
#   rollback semantics, migration policy),
#   docs/adr/ADR-004-frontend-hosting-render.md (frontend web service on
#   Render; Vercel dropped - owner decision 2026-07-14). Operator steps:
#   docs/DEPLOYMENT_AND_ROLLBACK.md.
#
# Spec reference: https://render.com/docs/blueprint-spec (retrieved 2026-07-14).
# Render reads this file from the repository root:
#   https://render.com/docs/infrastructure-as-code (retrieved 2026-07-14).
#
# SECRETS POLICY (S1): every sensitive environment variable below is declared
# with `sync: false`, which makes Render prompt for the value in the dashboard
# at Blueprint creation time. NO literal secret values may EVER be added to
# this file. See PRD section 17 and ADR-002 section 3.
#
# RECONCILIATION STATUS (task M0-T015, 2026-07-17): the former [PLACEHOLDER]
# build/start commands were reconciled against the real services/api layout.
# Worker and cron services were REMOVED (their entrypoint modules do not
# exist yet — see the tracked note above the web frontend service). Nothing
# in this file is provisioned yet: B-002 (Render account) stays owner-gated.
#
# AUTH STATUS (M0-T015): the API has NO authentication — M0-T007/T008 are
# blocked on B-001. The API service below must NOT be publicly exposed until
# the auth/organization layer lands (M1-T005 G5 condition). Provisioning this
# Blueprint before then is for owner-controlled staging/internal use only.
# =============================================================================

# DEPLOY TRIGGER POLICY (ADR-003 D1/D2/D5): every production service below -
# including the frontend web service (ADR-004) - sets
# `autoDeployTrigger: "off"`. The value "off" is QUOTED because bare `off` is
# a YAML-1.1 boolean and would not be the string Render expects
# (docs/research/render-nextjs-previews-2026-07-16.md section 3;
# https://render.com/docs/blueprint-spec, retrieved 2026-07-16; applied
# 2026-07-16 per M0-T006 G3 residual). `autoDeployTrigger` is the CURRENT
# Blueprint field
# and "replaces the deprecated `autoDeploy` field"; if both are present,
# autoDeployTrigger takes precedence; `off` is equivalent to the deprecated
# `autoDeploy: false` (https://render.com/docs/blueprint-spec, retrieved
# 2026-07-15). Production deploys are triggered ONLY by the GitHub Actions
# production deploy workflow (a FUTURE implementation task - it does not exist
# yet) calling each service's secret deploy hook URL with
# ref=<validated commit SHA>, after: migration validation -> production
# migrations succeed -> required CI checks pass -> human production approval
# (GitHub environment required reviewers). Deploy hook = per-service secret
# URL; ref pins the deploy to a specific commit; regenerate if compromised
# (https://render.com/docs/deploy-hooks, retrieved 2026-07-15). Hook URLs live
# ONLY in GitHub `production` environment secrets - never in this file.
# STAGING instances instead keep platform auto-deploy on push to `main`
# (autoDeployTrigger: commit), configured when the staging services are
# instantiated [confirm at first use - ADR-002 "Items requiring verification"
# item 1; a single render.yaml cannot carry per-environment trigger values].

# Preview environments: create per-PR copies of these services only when a PR
# explicitly opts in (manual generation), to avoid surprise billing. Previews
# are billed at the base-service rate; sync:false env vars are NOT copied into
# previews and must be provided or moved to an env group if previews need them.
# Source: https://render.com/docs/preview-environments (retrieved 2026-07-14).
previews:
  generation: manual
  expireAfterDays: 3

services:
  # ---------------------------------------------------------------------------
  # 1) FastAPI web service - the single deployable API (ADR-001: one FastAPI
  #    service; workers/cron are separate instances of the same codebase).
  # ---------------------------------------------------------------------------
  - type: web
    name: nycdf-api
    runtime: python
    rootDir: services/api
    # Plan: free web services spin down after 15 minutes of inactivity
    # (https://render.com/docs/free, retrieved 2026-07-14); the API must stay
    # warm for analysis runs, so `starter` is the minimum. ADR-002 section 6
    # sequences when paid plans are actually activated.
    plan: starter
    # Region pinned for co-location of api/worker/cron. Confirm the valid
    # region list against https://render.com/docs/regions at first deploy
    # (ADR-002, "Items requiring verification at first setup").
    region: oregon
    # Production: no platform auto-deploy; deploys only via secret deploy hook
    # from the Actions pipeline (see DEPLOY TRIGGER POLICY above, ADR-003 D2).
    autoDeployTrigger: "off"
    # Reconciled 2026-07-17 (M0-T015); relocked 2026-07-20 (M0-T018):
    # services/api/requirements.txt is now a GENERATED, fully hash-pinned lock
    # (direct AND transitive production deps) produced from requirements.in by
    # `uv pip compile --universal --python-version 3.12 --generate-hashes`
    # (services/api/scripts/lock_requirements.sh; the api-lock-verify CI job
    # enforces byte-identity). Because every line carries a --hash, pip runs in
    # hash-checking mode and this install is HASH-VERIFIED automatically — no
    # extra flag needed. requirements.in pins the exact runtime versions
    # (jsonschema INCLUDED — it is a runtime dep of app/profile/contract.py);
    # pyproject.toml ranges remain the source of truth for allowed bounds.
    buildCommand: "pip install -r requirements.txt"
    # Reconciled 2026-07-17 (M0-T015): real ASGI path — services/api/app/main.py
    # exposes module-level `app` (built by create_app()).
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    # Render treats 2xx/3xx within 5s as healthy and gates zero-downtime
    # deploys on this path (https://render.com/docs/health-checks, retrieved
    # 2026-07-14). A deploy that never passes health checks does not replace
    # the running version - first line of rollback defense (ADR-003 D2).
    # Reconciled 2026-07-17 (M0-T015): the live route is /api/v1/health
    # (PRD section 21 versioned prefix; /health returns 404 by test).
    healthCheckPath: /api/v1/health
    envVars:
      # Non-secret but environment-scoped: value (`production` or `staging`)
      # is entered per Render environment at Blueprint/service creation, so
      # this one file serves both environments without hard-coding a name
      # (ADR-002 section 3).
      - key: ENVIRONMENT
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false  # trusted backend only - never in frontend (PRD 17)
      - key: SUPABASE_DB_URL
        sync: false
      - key: GEOCLIENT_SUBSCRIPTION_KEY
        sync: false  # NYC API Developers Portal key (docs/research/M0-T002-geoclient-address-resolution.md section 2.3)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      # CORS origin allowlist (task M0-T015; resolves M2-T001 G3 defect D8).
      # NON-SECRET but environment-scoped: comma-separated EXACT origins
      # (scheme://host[:port]) — set per environment to that environment's
      # nycdf-web URL. Wildcards are REJECTED at app startup because the API
      # allows credentialed requests (app/main.py enforces this; unset/empty
      # means no cross-origin access — safe default).
      - key: API_CORS_ALLOWED_ORIGINS
        sync: false

  # ---------------------------------------------------------------------------
  # 2) REMOVED SERVICES — TRACKED NOTE (task M0-T015, 2026-07-17).
  #    The background worker `nycdf-worker-jobs` (startCommand
  #    `python -m app.workers.job_runner`) and the cron job
  #    `nycdf-cron-source-monitor` (startCommand
  #    `python -m app.jobs.source_monitor`, schedule "0 6 * * *" UTC) were
  #    REMOVED from this Blueprint because neither entrypoint module exists in
  #    services/api yet — a Blueprint must not reference phantom entrypoints
  #    (owner deployment-blocker directive 2026-07-17, bullet 4).
  #    RESTORATION IS OWED, not optional:
  #      - the job-queue worker returns when the M1 connector-framework /
  #        job-system work delivers app/workers/job_runner.py (PRD section 22);
  #      - the source-monitor cron returns when the scheduled source-monitoring
  #        work delivers app/jobs/source_monitor.py (PRD 14.1).
  #    The task that delivers each module MUST restore its service block here
  #    in the same change (prior block content is preserved in git history at
  #    commit d61c9b6 and in docs/DEPLOYMENT_AND_ROLLBACK.md section 0 note).
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # 3) Next.js frontend web service (ADDED 2026-07-16 per ADR-004; owner
  #    decision 2026-07-14: frontend served from Render, Vercel dropped).
  #    Render's official guide deploys "a full Next.js app with server-side
  #    logic" as a WEB SERVICE - language Node, build `yarn; yarn build` (npm
  #    equivalents fine), start `yarn start`
  #    (docs/research/render-nextjs-previews-2026-07-16.md section 1;
  #    https://render.com/docs/deploy-nextjs-app, retrieved 2026-07-16).
  #    Build-cache note: Render does not persist .next/cache between builds by
  #    default; an optional build script can save/restore it via
  #    $XDG_CACHE_HOME (same source) - later optimization, not required.
  #    Previews: NONE initially (ADR-004 preview strategy; multi-service
  #    preview environments are Pro-plan-gated - research file section 2).
  #    Rollback: web services are rollback-eligible without rebuild
  #    (ADR-003 R1 as amended by ADR-004 / R2).
  # ---------------------------------------------------------------------------
  - type: web
    name: nycdf-web
    runtime: node
    rootDir: apps/web
    # Plan: free web services spin down after 15 minutes of inactivity
    # (https://render.com/docs/free, retrieved 2026-07-14) - unacceptable for
    # a client-facing frontend at launch, so `starter` is the declared target.
    # ADR-002 section 6 sequences when paid plans are actually activated;
    # nothing deploys or bills from this file alone (ADR-004 flags the new
    # paid instance for owner visibility).
    plan: starter
    # Same region as the API for co-location (see nycdf-api note above).
    region: oregon
    # Production: no platform auto-deploy; deploys only via this service's
    # secret deploy hook from the Actions pipeline, after migrations + human
    # approval - identical model to nycdf-api (ADR-003 D1 as amended, D2/D5;
    # DEPLOY TRIGGER POLICY above). "off" quoted per blueprint spec (research
    # file section 3).
    autoDeployTrigger: "off"
    # npm equivalents of the official guide's yarn commands (research file
    # section 1), matched to apps/web/package.json scripts (build=`next
    # build`, start=`next start`; package-lock.json is committed, so `npm ci`
    # is deterministic). Reconcile only if apps/web tooling changes.
    buildCommand: "npm ci && npm run build"
    startCommand: "npm run start"
    # Zero-downtime deploy gating: Render treats 2xx/3xx within 5s as healthy
    # (https://render.com/docs/health-checks, retrieved 2026-07-14). The root
    # page of the Next.js app serves as the health endpoint.
    healthCheckPath: /
    envVars:
      # PUBLISHABLE VALUES ONLY (apps/web/.env.example security boundary):
      # NEXT_PUBLIC_* variables are compiled into the public browser bundle.
      # The Supabase SERVICE-ROLE key, database URLs, deploy hooks, and every
      # other privileged credential must NEVER appear on this service
      # (PRD 14.3/17; ADR-002 section 3). Values are environment-scoped and
      # entered per Render environment at Blueprint/service creation.
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false  # anon/publishable key only - safe because RLS enforces access
      # API wiring decision (task M0-T015; resolves M2-T001 G3 defect D8):
      # the frontend calls the API CROSS-ORIGIN at this base URL, paired with
      # the API's exact-origin CORS allowlist (API_CORS_ALLOWED_ORIGINS on
      # nycdf-api = this service's URL). Chosen over a same-origin proxy
      # because apps/web already consumes NEXT_PUBLIC_API_BASE_URL (M2-T001,
      # apps/web/.env.example) and a proxy would add a second hop + moving
      # part with no security gain (no credential is hidden by proxying — the
      # value is a publishable URL compiled into the browser bundle).
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
