# Standalone secret-scan workflow (task M0-T005).
#
# Fails CI when .github/scripts/secret_scan.py (stdlib-only, no network)
# finds likely credentials in the checked-out tree. Complements — does not
# replace — GitHub push protection (docs/SECRETS_POLICY.md section 6).
#
# Security posture:
# - permissions: contents: read (least privilege; no secrets referenced)
# - actions pinned to full commit SHAs with version comments (G5 Defect 1)
# - runner-preinstalled python3 only; no setup actions, no installs

name: secret-scan

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Scan repository for credentials
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # SHA verified by orchestrator 2026-07-15 via `git ls-remote https://github.com/actions/checkout refs/tags/v4.2.2`
      # (producer's proposed 08c6903... was actually the v5.0.0 commit, mislabeled in the M0-T004 G5 report example)
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run secret scan
        run: python3 .github/scripts/secret_scan.py
