name: CI

# Task M0-T004: remote lint/tests/build for web, api, and contracts.
# No secrets are referenced anywhere in this workflow (scenario S3).
# Installs run only on GitHub-hosted runners, never on the owner's PC
# (docs/LOW_STORAGE_CLOUD_DEVELOPMENT_POLICY.md).

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      # M0-T019: pin npm to the reviewed 11.18.0 so the runner honors
      # apps/web/.npmrc (min-release-age, save-exact) and the postcss override.
      # min-release-age was introduced in npm 11.10.0. Fail the job if the pin
      # did not take effect (docs/DEPENDENCY_SECURITY_POLICY.md).
      - name: Pin npm 11.18.0
        run: |
          npm install -g npm@11.18.0
          test "$(npm --version)" = "11.18.0" || { echo "npm pin failed: $(npm --version) != 11.18.0"; exit 1; }
      # Lockfile is generated by .github/workflows/generate-lockfile.yml on a
      # GitHub runner (never on the owner's PC) and committed to the branch.
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      # M0-T019: BLOCKING supply-chain audit including dev deps. `npm ci` stays
      # --no-audit (deterministic install) and this explicit audit is the gate.
      # Two layers: `--audit-level=low` fails on any advisory at/above low, and
      # the JSON parse fails the job unless metadata.vulnerabilities.total == 0
      # (catches "info"-level findings the level flag would let pass). No
      # allowlist, no --ignore, no warning-only downgrade
      # (docs/DEPENDENCY_SECURITY_POLICY.md). A post-merge advisory is caught by
      # scheduled-npm-audit.yml.
      - name: Dependency audit — zero advisories incl. dev deps (blocking)
        run: |
          npm audit --audit-level=low
          npm audit --json > "$RUNNER_TEMP/npm-audit.json"
          node -e "const t=require(process.env.RUNNER_TEMP+'/npm-audit.json').metadata.vulnerabilities.total; if(t!==0){console.error('npm audit total vulnerabilities='+t+' (must be 0)');process.exit(1)} console.log('npm audit total vulnerabilities=0')"
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  # Task M0-T019 policy-enforcement correction (ADDITIVE job; existing jobs
  # untouched): the machine-enforced committed-lockfile release-age gate.
  #
  # WHY A SEPARATE, BLOCKING JOB
  # ---------------------------
  # apps/web/.npmrc `min-release-age=7` only filters versions while npm RESOLVES
  # (regenerates) the lock. CI installs the COMMITTED lock with `npm ci`, which
  # does NOT resolve — so a hand-edited lock could smuggle a <7-day (or
  # forged-integrity) package past `npm ci` + `npm audit`. This job independently
  # validates the committed apps/web/package-lock.json, fail-closed, against live
  # registry metadata + the registry's own UTC clock, and is the AUTHORITATIVE age
  # enforcement (the npm parallel of the Python age gate in exact-production-install).
  # It also re-checks the pinned npm 11.18.0 CLI tooling for advisories + age
  # (FE-S11). REQUIRED + BLOCKING: any failure fails CI. The gate is Node-builtins
  # only (no npm deps), so it needs no install; it needs network (registry + OSV),
  # which is available on GitHub runners.
  web-lockfile-age-gate:
    name: web-lockfile-age-gate (committed lock >= 7 days, fail-closed, incl. npm tooling)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      # Same reviewed npm 11.18.0 pin as the other jobs (version-checked); the gate
      # reports on exactly this tooling version via `npm -v`.
      - name: Pin npm 11.18.0
        run: |
          npm install -g npm@11.18.0
          test "$(npm --version)" = "11.18.0" || { echo "npm pin failed: $(npm --version) != 11.18.0"; exit 1; }
      # Age-gate LOGIC regressions: the 604800 PASS / 604799 FAIL boundary, the
      # integrity-match anti-forgery check, enumeration/dedupe, and every
      # fail-closed branch (deterministic, offline, injected UTC now). No npm deps.
      - name: Age-gate deterministic unit tests
        run: node --test apps/web/scripts/tests/*.test.mjs
      # LIVE gate over the committed lock: every registry package must be
      # >= 604800 s old with registry-matching integrity, and npm@$(npm -v) must be
      # advisory-free and >= 7 days old. Fail-closed on any outage/mismatch.
      - name: Committed-lockfile release-age gate — >= 7 days, fail-closed (blocking)
        run: node apps/web/scripts/dependency_age_gate.mjs apps/web/package-lock.json --npm-tooling-version "$(npm -v)"

  # Task M2-T001 (ADDITIVE job; existing jobs untouched): unit tests plus
  # Playwright human journeys for the Property screen. The browser talks to
  # the REAL FastAPI app served by the recorded-official-fixture harness
  # (apps/web/e2e/harness/fixture_api.py) — committed official PLUTO
  # captures through the accepted fetcher-dependency seam, not frontend
  # mocks. Uses only actions already used elsewhere in this file.
  web-e2e:
    name: web-e2e (vitest + Playwright vs recorded-official-fixture API)
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      # M0-T019: pin npm to the reviewed 11.18.0 (same as the web job) so this
      # job's `npm ci` honors apps/web/.npmrc and the postcss override.
      - name: Pin npm 11.18.0
        run: |
          npm install -g npm@11.18.0
          test "$(npm --version)" = "11.18.0" || { echo "npm pin failed: $(npm --version) != 11.18.0"; exit 1; }
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/pyproject.toml
      # M0-T020: install the EXACT hash-pinned production runtime tree, then the
      # app itself with --no-deps, so the harness serves the real app from the
      # locked tree (no unpinned pip upgrade, no range resolution). Mirrors the
      # Render / exact-production-install path.
      - name: Install API package (harness serves the real app; from the runtime lock)
        working-directory: services/api
        run: |
          pip install --require-hashes -r requirements.txt
          pip install --no-deps .
      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci --no-audit --no-fund
      - name: Unit and component tests (vitest)
        working-directory: apps/web
        run: npm run test
      - name: Build production bundle (served by `next start` during e2e)
        working-directory: apps/web
        run: npm run build
      - name: Install Playwright chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Playwright human journeys (S1-S8)
        working-directory: apps/web
        run: npm run test:e2e
      - name: Upload Playwright traces and report for the G3 reviewer
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-evidence
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 7
          if-no-files-found: ignore

  api:
    name: api (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/pyproject.toml
      # M0-T020: no more `pip install .[dev]` range resolution and no unpinned
      # pip upgrade. Tools (ruff, pytest, httpx, ...) come from the hash-pinned
      # tooling lock; the app's runtime deps come from the hash-pinned production
      # lock; the app itself installs with --no-deps so ONLY the two locks supply
      # dependencies.
      - name: Install tooling from the hash-pinned tooling lock
        run: pip install --require-hashes -r requirements-tools.lock
      - name: Install runtime deps from the hash-pinned production lock
        run: pip install --require-hashes -r requirements.txt
      - name: Install app package only (no deps — both locks already pinned)
        run: pip install --no-deps .
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest -q

  # Task M0-T018 (ADDITIVE job; existing jobs untouched): prove the committed
  # production lock services/api/requirements.txt is a byte-identical, up-to-date
  # regeneration from requirements.in. Uses a PINNED uv (resolver output can
  # change across uv releases) and the same --universal / --python-version 3.12
  # / --generate-hashes flags Render's build reproducibility depends on. Fails
  # loudly if requirements.txt drifts from requirements.in (someone edited the
  # lock by hand or forgot to regenerate). No app install needed.
  api-lock-verify:
    name: api-lock-verify (requirements.txt is a fresh hash-pinned uv lock)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      # M0-T020: bootstrap the PINNED uv (0.11.28) FROM the hash-pinned tooling
      # lock using the runner's existing pip — never download an unlocked
      # `uv==...` first. The lock hash-pins uv itself (require-hashes verifies
      # every artifact); installing the whole lock puts the `uv` console script
      # on PATH so lock_requirements.sh --check finds exactly uv 0.11.28.
      - name: Install pinned uv from the tooling lock (hash-verified)
        run: pip install --require-hashes -r requirements-tools.lock
      - name: Verify requirements.txt is byte-identical to a fresh lock
        run: bash scripts/lock_requirements.sh --check

  # Task M0-T020 (ADDITIVE job): prove the Python TOOLING lock
  # (services/api/requirements-tools.lock) is a byte-identical, up-to-date
  # regeneration of requirements-tools.in via the PINNED uv (bootstrapped FROM
  # the lock itself), and run the release-age gate's deterministic unit tests
  # (which the `api` job's testpaths=["tests"] does not collect). The live age
  # gate and the dual pip-audit run in exact-production-install and
  # scheduled-audit; this job guards the lock's integrity and the gate's logic.
  api-tooling-lock-verify:
    name: api-tooling-lock-verify (tooling lock byte-identical + age-gate unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      # Bootstrap the pinned uv (0.11.28) + pytest FROM the hash-pinned tooling
      # lock using the runner's existing pip — never download an unlocked uv or
      # pytest first. Puts the `uv` console script on PATH for lock_tools.sh.
      - name: Install tooling from the tooling lock (hash-verified)
        run: pip install --require-hashes -r requirements-tools.lock
      - name: Verify requirements-tools.lock is byte-identical to a fresh lock
        run: bash scripts/lock_tools.sh --check
      # Age-gate LOGIC regressions: 604800 PASS / 604799 FAIL boundary and every
      # fail-closed branch (deterministic, offline, injected UTC now).
      - name: Age-gate deterministic unit tests
        run: pytest scripts/tests -q

  # Task M0-T018 (ADDITIVE job; existing jobs untouched): the EXACT Render
  # production install path, exercised end to end. This is the authoritative
  # proof that the deployed dependency tree is complete (jsonschema present),
  # advisory-clean, and actually runs validate_profile — the health endpoint
  # cannot prove this because contract.py imports jsonschema lazily.
  exact-production-install:
    name: exact-production-install (Render pip install path + validate_profile + pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      # Clean env, EXACTLY Render's build command (render.yaml buildCommand:
      # `pip install -r requirements.txt`). --require-hashes is implied because
      # the lock is fully hashed; make it explicit so an unhashed line fails.
      # M0-T020: the unpinned `pip install --upgrade pip` is removed; pip is
      # pinned in the tooling lock and installed into the isolated audit venv
      # below (the runner's stock pip is sufficient for a hash-verified install).
      - name: Install production tree via Render's exact command (hash-verified)
        run: pip install --require-hashes -r requirements.txt
      # Make the real app importable without dev extras (mirrors the production
      # image / web-e2e non-editable install): install the package itself with
      # NO dependencies so ONLY the locked production tree above provides them.
      - name: Install app package only (no deps — production tree already pinned)
        run: pip install --no-deps .
      - name: pip check (no broken/conflicting requirements)
        run: pip check
      # M0-T020: pip-audit (and its OWN transitive tree) is installed into a
      # SEPARATE venv from the hash-pinned tooling lock — no `pipx run --spec`
      # dynamic transitive resolution — so the audit tool is exact and audited
      # and never perturbs the pinned production tree the pytest step runs
      # against. The lock hash-pins pip-audit and every transitive.
      - name: Create isolated audit venv and install pip-audit from the tooling lock
        run: |
          python -m venv "$RUNNER_TEMP/auditenv"
          "$RUNNER_TEMP/auditenv/bin/pip" install --require-hashes -r requirements-tools.lock
      # DUAL audit, BLOCKING at every severity. Each lock is a full transitive
      # closure, so `-r <lock> --no-deps --strict` audits exactly the pinned
      # versions; --strict fails if any pinned package cannot be audited. There
      # is no --ignore-vuln / allowlist / print-only downgrade anywhere. The
      # starlette 1.3.1 pin clears the prior nine advisories
      # (PYSEC-2026-161/248/249/1941/1942/2280/2281).
      - name: pip-audit — PRODUCTION lock must have ZERO advisories (blocking)
        run: |
          "$RUNNER_TEMP/auditenv/bin/pip-audit" -r requirements.txt --no-deps --strict
      - name: pip-audit — TOOLING lock must have ZERO advisories (blocking)
        run: |
          "$RUNNER_TEMP/auditenv/bin/pip-audit" -r requirements-tools.lock --no-deps --strict
      # M0-T020: machine-enforced release-age gate over BOTH locks (direct AND
      # transitive), using live PyPI metadata + PyPI's own UTC clock. Every
      # admitted artifact must be >= 604800 s old or the build fails closed. The
      # gate is stdlib-only, so it runs on the isolated audit venv's Python.
      - name: Dependency release-age gate — both locks, >= 7 days (blocking)
        run: |
          "$RUNNER_TEMP/auditenv/bin/python" scripts/dependency_age_gate.py requirements.txt requirements-tools.lock
      - name: POSITIVE smoke — create_app + validate_profile on a valid fixture
        run: python scripts/exact_install_smoke.py
      # NEGATIVE smoke (the key proof): remove jsonschema, the SAME gate must
      # FAIL loudly inside validate_profile. Proves the smoke exercises the
      # runtime import, not a health endpoint.
      - name: NEGATIVE smoke — jsonschema removed makes validate_profile FAIL
        run: |
          pip uninstall -y jsonschema
          python scripts/exact_install_smoke.py --expect-missing-jsonschema
      - name: Restore the production tree from the locked lock (hash-verified)
        run: pip install --require-hashes -r requirements.txt
      # DP-S5: run the FULL API suite against the production-installed tree. The
      # test tools (pytest, httpx TestClient transport, ...) are added from the
      # hash-pinned TOOLING lock — no `.[dev]` range resolution. The two locks
      # share six transitives (anyio, colorama, h11, idna, pyyaml,
      # typing-extensions) at IDENTICAL versions, so the production runtime tree
      # is preserved exactly (verified by the pip check above and re-run here);
      # this proves the production tree runs the whole suite.
      - name: Install test tools from the tooling lock (hash-verified)
        run: pip install --require-hashes -r requirements-tools.lock
      - name: pip check after adding test tools (production pins preserved)
        run: pip check
      - name: Pytest against the production-installed tree
        run: pytest -q

  contracts:
    name: contracts (JSON Schema validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Uses only the runner's preinstalled Python. The contract-schema
      # validator is stdlib-only. PyYAML (for the render.yaml syntax check) is
      # installed hash-pinned from the tooling lock — M0-T020 replaced the
      # unpinned `pip install --quiet pyyaml` so no audited Python path resolves
      # a package outside the two locks.
      - name: Validate contract schemas
        run: python3 .github/scripts/validate_contracts.py
      - name: Install PyYAML from the hash-pinned tooling lock
        run: python3 -m pip install --require-hashes -r services/api/requirements-tools.lock
      - name: Validate render.yaml (Blueprint YAML syntax)
        run: python3 -c "import yaml; yaml.safe_load(open('render.yaml', encoding='utf-8'))"

  # Task M2-T003 (ADDITIVE job; existing jobs untouched): deterministic
  # TypeScript type-generation drift check for the canonical property-profile
  # contract. Regenerates the committed types with a STDLIB-ONLY Python
  # generator (no Node toolchain, no network - thin-client policy) and fails
  # if packages/contracts/generated/property_profile.ts diverges byte-for-byte.
  # Also runs the generator's own determinism + 100%-key-coverage tests.
  contracts-typegen:
    name: contracts-typegen (TS drift check, byte-identical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      # Byte-identical drift check: the committed generated file must equal a
      # fresh generation. --check exits non-zero on any divergence. The
      # generator itself is stdlib-only, so this step needs no dependencies.
      - name: Check generated TypeScript types are up to date
        run: python3 packages/contracts/scripts/generate_ts_types.py --check
      # pytest for the generator's determinism + 100%-key-coverage tests (only
      # test-time dependency; the generator has none). M0-T020: installed
      # hash-pinned from the tooling lock (pytest 9.0.3) — the ranged
      # `pytest>=8,<9` install is removed so this audited Python path resolves
      # nothing outside the two locks.
      - name: Install pytest from the hash-pinned tooling lock
        run: python3 -m pip install --require-hashes -r services/api/requirements-tools.lock
      - name: Run type-generator tests
        run: python3 -m pytest packages/contracts/scripts/tests -q

  # Task M2-T003 rework (ADDITIVE job; existing jobs untouched): prove the
  # runtime-bundled contract schemas shipped inside the installed api package
  # (services/api/app/_contract_schemas/v1/*.schema.json) are byte-identical to
  # the CANONICAL source (packages/contracts/schemas/v1/*.schema.json). The
  # canonical source stays authoritative; the bundled copies are build
  # artifacts kept provably in sync so the non-editable install (web-e2e,
  # production) loads the exact canonical schemas via importlib.resources.
  # Stdlib-only; mirrors the contracts-typegen drift-check pattern.
  contracts-schema-bundle:
    name: contracts-schema-bundle (runtime schema drift check, byte-identical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      # --check exits non-zero if any bundled copy is missing or diverges.
      # The sync script is stdlib-only, so this step needs no dependencies.
      - name: Check runtime-bundled contract schemas are byte-identical to canonical
        run: python3 services/api/scripts/sync_contract_schemas.py --check

  control-plane:
    name: control-plane (workflow regression test, ADR-005)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Stdlib only; proves producer-submit / reviewer-report /
      # orchestrator-gate authority rules and bootstrap defect regressions.
      - name: Run project-control regression test
        run: python3 tools/test_project_control.py
      # B-007 dispatch guard (owner directive 2026-07-17): the five expansion agents
      # must be programmatically rejected while B-007 is open; roster agents unaffected.
      - name: Run agent dispatch-guard rejection test
        run: python3 tools/test_agent_dispatch_guard.py
