name: scheduled-python-audit

# Task M0-T018: continuous supply-chain audit of the EXACT Render production
# dependency tree (services/api/requirements.txt).
#
# WHY A SEPARATE WORKFLOW
# -----------------------
# The exact-production-install job in ci.yml audits the tree on every push/PR,
# but new advisories are published against ALREADY-PINNED versions AFTER a lock
# lands. This workflow re-audits the same committed lock on a schedule so a
# freshly disclosed advisory turns the run red and is visible/actionable even
# when no code changed. It also runs on PRs that touch the dependency artifacts
# so a dependency change is audited before merge.
#
# BLOCKING: pip-audit exits non-zero on ANY finding at ANY severity and --strict
# fails if any pinned package cannot be audited. No --ignore-vuln, no allowlist,
# no print-only downgrade — a finding fails the workflow (a red scheduled run is
# the actionable signal; wire notifications at the repo level if desired).
#
# M0-T020: the audit now covers BOTH the production runtime lock AND the Python
# tooling lock, and pip-audit's OWN transitive tree is installed hash-pinned
# from the tooling lock (no more pip-resolved `pip install pip-audit==...`
# transitives). The release-age gate also runs here so a package that ages out
# of some other constraint, or a freshly re-uploaded artifact, is caught daily.

on:
  schedule:
    # 06:17 UTC daily (offset from :00 to avoid the top-of-hour scheduler surge;
    # GitHub does not guarantee exact cron times).
    - cron: "17 6 * * *"
  pull_request:
    paths:
      - "services/api/requirements.txt"
      - "services/api/requirements.in"
      - "services/api/requirements-tools.in"
      - "services/api/requirements-tools.lock"
      - "services/api/pyproject.toml"
      - "services/api/scripts/dependency_age_gate.py"
      - ".github/workflows/scheduled-audit.yml"
  # Manual trigger so the owner/orchestrator can re-audit on demand.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scheduled-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: pip-audit (production tree, blocking on any finding)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      # M0-T020: install pip-audit AND its full transitive tree hash-pinned from
      # the tooling lock (no pip-resolved transitives). The lock hash-pins
      # pip-audit==2.10.1 and every dependency exactly.
      - name: Install pip-audit from the hash-pinned tooling lock
        run: python -m pip install --require-hashes -r requirements-tools.lock
      # Audit each exact pinned lock (full transitive closure -> --no-deps).
      # --strict makes an un-auditable pinned package a failure too. BLOCKING at
      # every severity; no allowlist/ignore/waiver.
      - name: Audit exact production tree (blocking on any finding)
        run: python -m pip_audit -r requirements.txt --no-deps --strict
      - name: Audit exact tooling tree (blocking on any finding)
        run: python -m pip_audit -r requirements-tools.lock --no-deps --strict
      # M0-T020: daily release-age gate over both locks (live PyPI + PyPI UTC
      # clock); fails closed if any admitted artifact is < 7 days old or cannot
      # be verified. Stdlib-only.
      - name: Dependency release-age gate — both locks, >= 7 days (blocking)
        run: python scripts/dependency_age_gate.py requirements.txt requirements-tools.lock
