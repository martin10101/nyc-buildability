name: Generate web lockfile

# One-shot utility (M0-T004 follow-up): generates apps/web/package-lock.json
# on a GitHub-hosted runner (never on the owner's PC, per
# docs/LOW_STORAGE_CLOUD_DEVELOPMENT_POLICY.md) and commits it back to the
# branch it was dispatched on. After the lockfile lands, ci.yml switches the
# web job from `npm install` to `npm ci`.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      # M0-T019: pin npm to the reviewed 11.18.0 BEFORE generating the lock so
      # the regenerated apps/web/package-lock.json honors apps/web/.npmrc
      # (min-release-age=7 -> no package younger than 7 days is admitted) and
      # the "overrides": { "postcss": "8.5.10" } pin. min-release-age needs
      # npm >= 11.10.0 (docs/DEPENDENCY_SECURITY_POLICY.md).
      - name: Pin npm 11.18.0
        run: |
          npm install -g npm@11.18.0
          test "$(npm --version)" = "11.18.0" || { echo "npm pin failed: $(npm --version) != 11.18.0"; exit 1; }
      - name: Generate package-lock.json (no node_modules)
        working-directory: apps/web
        run: npm install --package-lock-only --no-audit --no-fund
      - name: Commit lockfile to this branch
        run: |
          git add apps/web/package-lock.json
          if git diff --cached --quiet; then
            echo "Lockfile unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(web): generate package-lock.json on CI runner (M0-T004)"
          git push
